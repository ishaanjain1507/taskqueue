<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RateSentry Core | Task Queue</title>
    <link rel="stylesheet" href="/static/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <main class="container">
        <header class="header">
            <h1>RateSentry <span>Core</span></h1>
            <p>High-Performance Asynchronous Job Processing</p>
        </header>

        <section class="stats-grid" id="statsGrid">
            <div class="stat-card glass" id="card-pending">
                <div class="stat-icon pending-icon"></div>
                <div class="stat-info">
                    <h3>Pending</h3>
                    <p id="stat-pending">0</p>
                </div>
            </div>
            <div class="stat-card glass" id="card-processing">
                <div class="stat-icon processing-icon"></div>
                <div class="stat-info">
                    <h3>Processing</h3>
                    <p id="stat-processing">0</p>
                </div>
            </div>
            <div class="stat-card glass" id="card-success">
                <div class="stat-icon success-icon"></div>
                <div class="stat-info">
                    <h3>Successful</h3>
                    <p id="stat-success">0</p>
                </div>
            </div>
            <div class="stat-card glass" id="card-failed">
                <div class="stat-icon failed-icon"></div>
                <div class="stat-info">
                    <h3>Failed (DLQ)</h3>
                    <p id="stat-failed">0</p>
                </div>
            </div>
            <div class="stat-card glass" id="card-active-workers">
                <div class="stat-info">
                    <h3 style="color: var(--accent-primary);">Active Workers</h3>
                    <p id="activeWorkersVal">0</p>
                </div>
            </div>
        </section>

        <div class="dashboard-split">
            <section class="action-panel glass">
                <h2>Control Center</h2>
                <form id="jobForm">
                    <div class="input-group">
                        <label for="workerCount">Live Worker Pool Size</label>
                        <div style="display: flex; gap: 0.5rem;">
                            <input type="number" id="workerCount" value="5" min="0" max="100">
                            <button type="button" class="btn-primary btn-sm" id="scaleBtn">Scale</button>
                        </div>
                    </div>
                    
                    <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 1.5rem 0;">

                    <div class="input-group">
                        <label for="jobType">Job Type</label>
                        <select id="jobType" name="jobType">
                            <option value="email_dispatch">Email Dispatch</option>
                            <option value="video_encoding">Video Encoding</option>
                            <option value="data_ingestion">Data Ingestion</option>
                            <option value="trigger_error">Force Failure (Test DLQ)</option>
                        </select>
                    </div>
                    
                    <div class="input-group">
                        <label for="spamCount">Burst Spam Count</label>
                        <input type="number" id="spamCount" value="10" min="1" max="1000">
                    </div>
                    
                    <div class="form-actions" style="margin-top: 1.5rem;">
                        <button type="button" class="btn-primary" id="singleBtn">
                            <span class="btn-text">Submit 1 Job</span>
                            <span class="loader hidden" id="singleLoader"></span>
                        </button>
                        <button type="submit" class="btn-secondary" id="simulateBtn">Burst Jobs!</button>
                        <button type="button" class="btn-secondary" id="purgeBtn" style="border-color: #ef4444; color: #ef4444;">Purge System</button>
                    </div>
                </form>
            </section>

            <section class="data-panel glass">
                <div class="tabs">
                    <button class="tab-btn active" data-target="recentJobs">Recent Jobs</button>
                    <button class="tab-btn" data-target="dlqJobs">Dead Letter Queue</button>
                    <button class="tab-btn" data-target="liveFeed">Live Feed</button>
                </div>
                
                <div id="recentJobs" class="tab-content active">
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Worker</th>
                                    <th>Status</th>
                                    <th>Wait Time</th>
                                    <th>Exec Time</th>
                                    <th>Total Time</th>
                                </tr>
                            </thead>
                            <tbody id="recentJobsBody"></tbody>
                        </table>
                    </div>
                </div>

                <div id="dlqJobs" class="tab-content">
                    <div class="table-container">
                        <table class="data-table">
                            <thead><tr><th>ID</th><th>Type</th><th>Error</th><th>Action</th></tr></thead>
                            <tbody id="dlqJobsBody"></tbody>
                        </table>
                    </div>
                </div>
                
                <div id="liveFeed" class="tab-content">
                    <div class="feed-container" id="feedContainer">
                        <div class="feed-empty">No activity yet. Submit a job to start.</div>
                    </div>
                </div>
            </section>
        </div>
        <div id="toastContainer"></div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
